services:

  db:
    image: postgres:16-alpine
    container_name: MusicBot_DB
    restart: unless-stopped
    environment:
      POSTGRES_DB:       MusicBot
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: admin
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d MusicBot"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: MusicBot_Ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q 'qwen:4b' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ollama-init:
    image: ollama/ollama:latest
    container_name: MusicBot_Ollama_Init
    depends_on:
      - ollama
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      /bin/sh -c "
        echo 'Aguardando Ollama iniciar...';
        sleep 10;
        ollama pull qwen:4b;
        echo 'Modelo qwen:4b baixado com sucesso!';
      "
    restart: "no"

  backend:
    build: ./backend
    container_name: MusicBot_backend
    restart: unless-stopped
    environment:
      DATABASE_URL:          postgresql://admin:admin@db:5432/MusicBot
      APP_SECRET_KEY:        musicbot-dev-secret-key
      SPOTIFY_REDIRECT_URI:  http://127.0.0.1:5000/auth/callback
      FRONTEND_URL:          http://localhost:8080
      OLLAMA_BASE_URL:       http://ollama:11434
      OLLAMA_MODEL:          qwen:4b
      OLLAMA_KEEP_ALIVE:     30s
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: MusicBot_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data:
  ollama_data: